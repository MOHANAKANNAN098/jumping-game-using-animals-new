<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monkey Runner - Subway Style</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="topbar">
    <div id="credits">Game by MOHANAKANNAN</div>
    <div id="soundToggle">🔊</div>
  </div>

  <div id="scorebar">
    <div id="scoreLabel">SCORE</div>
    <div id="scoreValue">0</div>
    <div id="coinsLabel">COINS</div>
    <div id="coinsValue">0</div>
  </div>

  <div id="menu">
    <h1>🐒 MONKEY RUNNER</h1>
    <p>Subway Surfers Style!</p>
    <div class="animals">
      <label><input type="radio" name="animal" value="monkey" checked> 🐒 Monkey</label>
      <label><input type="radio" name="animal" value="elephant"> 🐘 Elephant</label>
      <label><input type="radio" name="animal" value="tiger"> 🐯 Tiger</label>
      <label><input type="radio" name="animal" value="eagle"> 🦅 Eagle</label>
    </div>
    <button id="startBtn">START GAME</button>
    <div class="controls">Use ← → Arrow Keys to Move</div>
  </div>

  <canvas id="game"></canvas>

  <div id="overlay" class="hidden">
    <h2>GAME OVER!</h2>
    <div id="finalScore">Score: 0</div>
    <div id="finalCoins">Coins: 0</div>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
